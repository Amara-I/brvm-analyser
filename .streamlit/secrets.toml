# =============================================================================
# CONFIGURATION SÉCURISÉE - BRVM Analytics
# =============================================================================
# Ce fichier contient les secrets et configurations sensibles.
# IMPORTANT: Ne JAMAIS commit ce fichier sur GitHub!
# =============================================================================

# -----------------------------------------------------------------------------
# Configuration Email pour les alertes
# -----------------------------------------------------------------------------

[email]
# ═══════════════════════════════════════════════════════════════════════════
# REMPLACEZ CES VALEURS PAR VOS PROPRES IDENTIFIANTS
# ═══════════════════════════════════════════════════════════════════════════

# Votre adresse Gmail (expéditeur des alertes)
sender = "tsakemvaldes@gmail.com"

# Mot de passe d'application Gmail (PAS votre mot de passe Gmail normal!)
# Générez-le ici: https://myaccount.google.com/apppasswords
# Sélectionnez "Mail" + "App: brvm-analytics"
password = "Brvmanalyser2026!"

# Liste des destinataires (séparés par des virgules ou liste)
# Exemple: ["email1@gmail.com", "email2@gmail.com", "partner@example.com"]
recipients = ["patrikoto@gmail.com", "valdestsakem@yahoo.fr"]

# Heure d'envoi quotidienne des alertes (format 24h)
# La BRVM ferme à 15h30, donc 17:30 est idéal pour envoyer après clôture
alert_time = "17:30"


# -----------------------------------------------------------------------------
# Configuration de l'authentification
# -----------------------------------------------------------------------------

[auth]
# ═══════════════════════════════════════════════════════════════════════════
# ADMIN: Accès complet (lecture + configuration alertes)
# UTILISATEURS: Accès lecture seule
# ═══════════════════════════════════════════════════════════════════════════

# Administrateurs (username = mot de passe)
# Changez les mots de passe pour la production!
[auth.admin]
admin = "admin123"
admin@example.com = "password"

# Utilisateurs en lecture seule
[auth.users]
user = "user123"
user@example.com = "password"
trader = "trader456"


# -----------------------------------------------------------------------------
# Configuration Application
# -----------------------------------------------------------------------------

[app]
# Nom de l'application
name = "BRVM Analytics"

# Version
version = "1.0.0"

# Description
description = "Analyse Technique et Fondamentale des Actions BRVM"

# Settings
[app.settings]

# Délai de cache des données (en minutes)
cache_duration_minutes = 5

# Nombre de jours pour les données historiques
historical_days = 60

# Seuils d'alerte
[app.thresholds]

# Score minimum pour recommandation ACHAT
buy_threshold = 70

# Score maximum pour recommandation VENTE
sell_threshold = 40

# Seuil RSI survente
rsi_oversold = 30

# Seuil RSI surachat
rsi_overbought = 70


# =============================================================================
# INSTRUCTIONS DE CONFIGURATION
# =============================================================================
#
# 1. CONFIGURER GMAIL:
#    a) Allez sur https://myaccount.google.com
#    b) Sécurité → Validation en 2 étapes → Activer si pas fait
#    c) Mots de passe d'application → Créer
#    d) Sélectionnez "Mail" + "Autre (nom personnalisé)"
#    e) Copiez le mot de passe généré (16 caractères type: xxxx xxxx xxxx xxxx)
#
# 2. REMPLIR LES CHAMPS CI-DESSUS:
#    - sender: votre_email@gmail.com
#    - password: le_mot_de_passe_généré
#    - recipients: vos_destinataires
#
# 3. CONFIGURER LES LOGINS:
#    - Modifiez les mots de passe par défaut!
#    - Ajoutez/supprimez des utilisateurs selon vos besoins
#
# 4. DEPLOYER SUR STREAMLIT CLOUD:
#    - Allez dans Settings → Secrets
#    - Copiez-collez tout le contenu de ce fichier
#    - NE COMMITTEZ PAS ce fichier sur GitHub!
#
# =============================================================================
